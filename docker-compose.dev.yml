services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: geoworkbench
      POSTGRES_USER: geoworkbench
      POSTGRES_PASSWORD: geoworkbench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoworkbench -d geoworkbench"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: geoworkbench
      MINIO_ROOT_PASSWORD: geoworkbench123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

